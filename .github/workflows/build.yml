name: Build and package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  CONFIGURATION: Release
  DOTNET_VERSION: 10.0.x
  APP_PROJECT: PangYa-Suite-Tools/PangYa-Suite-Tools.csproj
  SOLUTION_FILE: PangYa-Suite-Tools.slnx
  OUTPUT_DIR: artifacts

jobs:
  build:
    name: Build Windows application
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.SOLUTION_FILE }}"

      - name: Build
        run: dotnet build "${{ env.APP_PROJECT }}" --configuration "${{ env.CONFIGURATION }}" --no-restore

      - name: Test binary formats
        run: dotnet test "${{ env.SOLUTION_FILE }}" --configuration "${{ env.CONFIGURATION }}" --no-restore

      - name: Publish win-x64
        run: >
          dotnet publish "${{ env.APP_PROJECT }}"
          --configuration "${{ env.CONFIGURATION }}"
          --runtime win-x64
          --self-contained false
          --output "${{ env.OUTPUT_DIR }}/PangYa-Suite-Tools-win-x64"

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ env.OUTPUT_DIR }}/packages" | Out-Null

          Compress-Archive `
            -Path "${{ env.OUTPUT_DIR }}/PangYa-Suite-Tools-win-x64/*" `
            -DestinationPath "${{ env.OUTPUT_DIR }}/packages/PangYa-Suite-Tools-win-x64.zip" `
            -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PangYa-Suite-Tools-win-x64
          path: ${{ env.OUTPUT_DIR }}/packages/*.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.OUTPUT_DIR }}/packages/*.zip
